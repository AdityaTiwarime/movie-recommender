version: "3.9"

services:
  backend:
    build: ./backend
    container_name: movie-recommender-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - movie_data:/app/data
    networks:
      - recommender-network

  frontend:
    build: ./frontend
    container_name: movie-recommender-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - recommender-network

# Explicit custom Docker network connecting frontend and backend containers,
# as required by the project specification (rather than relying on the
# implicit default network Compose would otherwise create).
networks:
  recommender-network:
    driver: bridge

volumes:
  movie_data:
