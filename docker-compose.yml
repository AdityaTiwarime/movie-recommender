version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: movie-recommender-db
    environment:
      - POSTGRES_USER=movieuser
      - POSTGRES_PASSWORD=moviepass
      - POSTGRES_DB=moviedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movieuser -d moviedb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - recommender-network

  backend:
    build: ./backend
    container_name: movie-recommender-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DATABASE_URL=postgresql://movieuser:moviepass@postgres:5432/moviedb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - recommender-network

  frontend:
    build: ./frontend
    container_name: movie-recommender-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - recommender-network

# Explicit custom Docker network connecting all three containers, as
# required by the project specification (rather than relying on the
# implicit default network Compose would otherwise create).
networks:
  recommender-network:
    driver: bridge

volumes:
  postgres_data:
